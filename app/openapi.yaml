openapi: 3.1.0
info:
  title: RoomieMatch API
  description: API сервиса для поиска соседей по общежитию и совместной аренде жилья
  version: 1.0.0
servers:
- url: http://localhost:8000
  description: Local development server
tags:
- name: Auth
  description: Аутентификация и авторизация
- name: Users
  description: Пользователи
- name: Profiles
  description: Профили пользователей
- name: Deals
  description: Предложения о совместном проживании
- name: Reactions
  description: 'Реакции на предложения: лайки и дизлайки'
- name: Chats
  description: Чаты
- name: Messages
  description: Сообщения в чатах
- name: Complaints
  description: Жалобы
- name: Universities
  description: Университеты
- name: Faculties
  description: Факультеты
- name: Dorms
  description: Общежития
- name: Neighbourhoods
  description: Районы
- name: Tags
  description: Теги привычек и предпочтений
paths:
  /auth/register:
    post:
      tags:
      - Auth
      summary: Зарегистрировать нового пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Пользователь успешно зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Пользователь с таким email уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Ошибка валидации тела запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': &id001
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags:
      - Auth
      summary: Авторизовать пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Пользователь успешно авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Неверный email или пароль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Ошибка валидации тела запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
  /auth/me:
    get:
      tags:
      - Auth
      summary: Получить данные текущего пользователя
      responses:
        '200':
          description: Данные пользователя успешно получены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Пользователь не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - auth:me
  /users:
    get:
      tags:
      - Users
      summary: Получить список пользователей
      parameters:
      - name: page
        in: query
        description: Номер страницы
        schema:
          type: integer
          default: 1
      - name: page_size
        in: query
        description: Размер страницы
        schema:
          type: integer
          default: 20
      - name: email
        in: query
        description: Фильтр по email
        schema:
          type: string
      - name: role
        in: query
        description: Фильтр по роли
        schema:
          type: string
          enum:
          - user
          - admin
      responses:
        '200':
          description: Список пользователей успешно получен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '400':
          description: Некорректные query-параметры
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Недостаточно прав для просмотра списка пользователей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - users:read
  /users/{user_id}:
    get:
      tags:
      - Users
      summary: Получить пользователя по ID
      parameters:
      - name: user_id
        in: path
        required: true
        description: Идентификатор пользователя
        schema:
          type: integer
      responses:
        '200':
          description: Пользователь найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - users:read
    put:
      tags:
      - Users
      summary: Обновить пользователя
      parameters:
      - name: user_id
        in: path
        required: true
        description: Идентификатор пользователя
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Пользователь успешно обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Недостаточно прав для редактирования пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Пользователь с таким email уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Ошибка валидации тела запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - users:update
    delete:
      tags:
      - Users
      summary: Удалить пользователя
      parameters:
      - name: user_id
        in: path
        required: true
        description: Идентификатор пользователя
        schema:
          type: integer
      responses:
        '204':
          description: Пользователь успешно удалён
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Недостаточно прав для удаления пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - users:delete
  /users/{user_id}/profile:
    get:
      tags:
      - Profiles
      summary: Получить профиль пользователя
      parameters:
      - name: user_id
        in: path
        required: true
        description: Идентификатор пользователя
        schema:
          type: integer
      responses:
        '200':
          description: Профиль найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '404':
          description: Пользователь или профиль не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - profiles:read
    post:
      tags:
      - Profiles
      summary: Создать профиль пользователя
      parameters:
      - name: user_id
        in: path
        required: true
        description: Идентификатор пользователя
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileCreate'
      responses:
        '201':
          description: Профиль успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '404':
          description: Пользователь, университет или факультет не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Профиль для данного пользователя уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Ошибка валидации тела запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - profiles:create
    put:
      tags:
      - Profiles
      summary: Обновить профиль пользователя
      parameters:
      - name: user_id
        in: path
        required: true
        description: Идентификатор пользователя
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdate'
      responses:
        '200':
          description: Профиль успешно обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '404':
          description: Пользователь или профиль не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Недостаточно прав для редактирования профиля
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Ошибка валидации тела запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - profiles:update
    delete:
      tags:
      - Profiles
      summary: Удалить профиль пользователя
      parameters:
      - name: user_id
        in: path
        required: true
        description: Идентификатор пользователя
        schema:
          type: integer
      responses:
        '204':
          description: Профиль успешно удалён
        '404':
          description: Пользователь или профиль не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Недостаточно прав для удаления профиля
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - profiles:delete
  /profiles:
    get:
      tags:
      - Profiles
      summary: Получить список профилей
      parameters:
      - name: page
        in: query
        description: Номер страницы
        schema:
          type: integer
          default: 1
      - name: page_size
        in: query
        description: Размер страницы
        schema:
          type: integer
          default: 20
      - name: sex
        in: query
        description: Фильтр по полу
        schema:
          type: string
          enum:
          - male
          - female
      - name: age_min
        in: query
        description: Минимальный возраст
        schema:
          type: integer
      - name: age_max
        in: query
        description: Максимальный возраст
        schema:
          type: integer
      - name: uni_id
        in: query
        description: Фильтр по университету
        schema:
          type: integer
      - name: faculty_id
        in: query
        description: Фильтр по факультету
        schema:
          type: integer
      - name: city
        in: query
        description: Фильтр по городу
        schema:
          type: string
      - name: neighbourhood_id
        in: query
        description: Фильтр по району
        schema:
          type: integer
      - name: tag_id
        in: query
        description: Фильтр по тегу
        schema:
          type: integer
      - name: course
        in: query
        description: Фильтр по курсу
        schema:
          type: integer
      responses:
        '200':
          description: Список профилей успешно получен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileListResponse'
        '400':
          description: Некорректные query-параметры
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - profiles:read
  /deals:
    get:
      tags:
      - Deals
      summary: Получить список предложений о жилье
      parameters:
      - name: page
        in: query
        description: Номер страницы
        schema:
          type: integer
          default: 1
      - name: page_size
        in: query
        description: Размер страницы
        schema:
          type: integer
          default: 20
      - name: city
        in: query
        description: Фильтр по городу
        schema:
          type: string
      - name: deal_type
        in: query
        description: Тип предложения
        schema:
          type: string
          enum:
          - rent
          - dorm
      - name: budget_min
        in: query
        schema:
          type: integer
      - name: budget_max
        in: query
        schema:
          type: integer
      - name: people_amount
        in: query
        schema:
          type: integer
      - name: neighbourhood_id
        in: query
        schema:
          type: integer
      responses:
        '200':
          description: Список предложений успешно получен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealListResponse'
        '400':
          description: Некорректные query-параметры
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - deals:read
    post:
      tags:
      - Deals
      summary: Создать предложение о жилье
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DealCreate'
      responses:
        '201':
          description: Предложение успешно создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealResponse'
        '404':
          description: Профиль владельца не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Ошибка валидации тела запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - deals:create
  /deals/{deal_id}:
    get:
      tags:
      - Deals
      summary: Получить предложение по ID
      parameters:
      - name: deal_id
        in: path
        required: true
        description: Идентификатор предложения
        schema:
          type: integer
      responses:
        '200':
          description: Предложение найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DealResponse'
        '404':
          description: Предложение не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - deals:read
  /deals/{deal_id}/reactions:
    get:
      tags:
      - Reactions
      summary: Получить список реакций на предложение
      parameters:
      - name: deal_id
        in: path
        required: true
        description: Идентификатор предложения
        schema:
          type: integer
      - name: page
        in: query
        description: Номер страницы
        schema:
          type: integer
          default: 1
      - name: page_size
        in: query
        description: Размер страницы
        schema:
          type: integer
          default: 20
      - name: reaction_type
        in: query
        description: Фильтр по типу реакции
        schema:
          type: string
          enum:
          - like
          - dislike
      - name: profile_id
        in: query
        description: Фильтр по профилю, оставившему реакцию
        schema:
          type: integer
      - name: created_from
        in: query
        description: Начальная дата создания реакции
        schema:
          type: string
          format: date-time
      - name: created_to
        in: query
        description: Конечная дата создания реакции
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: Список реакций успешно получен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReactionListResponse'
        '400':
          description: Некорректные query-параметры
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Предложение не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - reactions:read
    post:
      tags:
      - Reactions
      summary: Создать реакцию на предложение
      parameters:
      - name: deal_id
        in: path
        required: true
        description: Идентификатор предложения
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReactionCreate'
      responses:
        '201':
          description: Реакция успешно создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReactionResponse'
        '404':
          description: Профиль или предложение не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Реакция уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Ошибка валидации тела запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - reactions:create
  /deals/{deal_id}/reactions/{reaction_id}:
    get:
      tags:
      - Reactions
      summary: Получить реакцию по ID в рамках предложения
      parameters:
      - name: deal_id
        in: path
        required: true
        description: Идентификатор предложения
        schema:
          type: integer
      - name: reaction_id
        in: path
        required: true
        description: Идентификатор реакции
        schema:
          type: integer
      responses:
        '200':
          description: Реакция найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReactionResponse'
        '404':
          description: Реакция или предложение не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - reactions:read
    delete:
      tags:
      - Reactions
      summary: Удалить реакцию на предложение
      parameters:
      - name: deal_id
        in: path
        required: true
        description: Идентификатор предложения
        schema:
          type: integer
      - name: reaction_id
        in: path
        required: true
        description: Идентификатор реакции
        schema:
          type: integer
      responses:
        '204':
          description: Реакция успешно удалена
        '404':
          description: Реакция или предложение не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Недостаточно прав для удаления реакции
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - reactions:delete
  /chats:
    get:
      tags:
      - Chats
      summary: Получить список чатов
      parameters:
      - name: page
        in: query
        description: Номер страницы
        schema:
          type: integer
          default: 1
      - name: page_size
        in: query
        description: Размер страницы
        schema:
          type: integer
          default: 20
      - name: profile_id
        in: query
        description: Фильтр по участнику чата
        schema:
          type: integer
      - name: deal_id
        in: query
        description: Фильтр по предложению о проживании
        schema:
          type: integer
      - name: created_from
        in: query
        description: Начальная дата создания чата
        schema:
          type: string
          format: date-time
      - name: created_to
        in: query
        description: Конечная дата создания чата
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: Список чатов успешно получен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatListResponse'
        '400':
          description: Некорректные query-параметры
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - chats:read
    post:
      tags:
      - Chats
      summary: Создать чат по предложению
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCreate'
      responses:
        '201':
          description: Чат успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '404':
          description: Профиль или предложение не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Чат для данного профиля и предложения уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Ошибка валидации тела запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500': *id001
      security:
      - OAuth2PasswordBearer:
        - chats:create
  /chats/{chat_id}:
    get:
      tags:
      - Chats
      summary: Получить чат по ID
      parameters:
      - name: chat_id
        in: path
        required: true
        description: Идентификатор чата
